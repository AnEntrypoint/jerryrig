<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Buck Bunny Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; align-items: center; justify-content: center; height: 100vh; }
    video { width: 640px; max-width: 100%; }
  </style>
</head>
<body>
  <video
    src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
    crossorigin="anonymous"
    autoplay
    controls
    loop
  ></video>
  <script>
    const v = document.querySelector('video')
    v.volume = 1.0
    v.play().catch(e => console.error('[video] play failed:', e.message))
  </script>
</body>
</html>
