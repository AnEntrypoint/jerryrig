<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jerryrig KVM Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
#wrap { position: relative; width: 100%; height: 100%; }
#vdo { position: absolute; inset: 0; width: 100%; height: 100%; border: none; pointer-events: none; }
#overlay { position: absolute; inset: 0; cursor: crosshair; }
#status { position: absolute; bottom: 0; left: 0; right: 0; height: 22px; background: rgba(0,0,0,0.7);
  color: #aaa; font-size: 11px; display: flex; align-items: center; padding: 0 8px; gap: 12px; z-index: 10; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #555; display: inline-block; margin-right: 4px; }
.dot.on { background: #4f4; }
</style>
</head>
<body>
<div id="wrap">
  <iframe id="vdo" allow="autoplay; camera; microphone; display-capture"></iframe>
  <div id="overlay" tabindex="0"></div>
  <div id="status">
    <span><span class="dot" id="wsDot"></span><span id="wsLbl">WS: disconnected</span></span>
    <span id="streamLbl"></span>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search)
const ROOM = params.get('room') || ''
const STREAM = params.get('stream') || ''
const WS_URL = params.get('ws') || 'ws://127.0.0.1:9888'
const TYPE_INPUT = 5

document.getElementById('streamLbl').textContent = ROOM ? `room=${ROOM} stream=${STREAM}` : 'No room configured'

if (ROOM && STREAM) {
  document.getElementById('vdo').src =
    `https://vdo.ninja/?view=${encodeURIComponent(STREAM)}&room=${encodeURIComponent(ROOM)}&autoplay=1&nocontrols=1`
}

function framed(type, payload) {
  const enc = new TextEncoder().encode(JSON.stringify(payload))
  const buf = new ArrayBuffer(8 + enc.byteLength)
  const v = new DataView(buf)
  v.setUint32(0, type, true)
  v.setUint32(4, enc.byteLength, true)
  new Uint8Array(buf, 8).set(enc)
  return buf
}

let ws = null
const wsDot = document.getElementById('wsDot')
const wsLbl = document.getElementById('wsLbl')

function connectWs() {
  ws = new WebSocket(WS_URL)
  ws.binaryType = 'arraybuffer'
  ws.onopen = () => { wsDot.classList.add('on'); wsLbl.textContent = 'WS: connected' }
  ws.onclose = () => { wsDot.classList.remove('on'); wsLbl.textContent = 'WS: disconnected'; ws = null; setTimeout(connectWs, 2000) }
  ws.onerror = () => {}
}
connectWs()

function send(evt) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return
  ws.send(framed(TYPE_INPUT, evt))
}

const overlay = document.getElementById('overlay')
overlay.focus()

const BUTTONS = ['none', 'left', 'middle', 'right']
const MOD = (e) => (e.shiftKey ? 8 : 0) | (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0)

function relXY(e) {
  const r = overlay.getBoundingClientRect()
  return { x: Math.round(e.clientX - r.left), y: Math.round(e.clientY - r.top) }
}

overlay.addEventListener('mousemove', (e) => {
  const { x, y } = relXY(e)
  send({ type: 'mouseEvent', x, y, button: 'none', buttons: 0, clickCount: 0, deltaX: 0, deltaY: 0, modifiers: MOD(e), pointerType: 'mouse' })
})

overlay.addEventListener('mousedown', (e) => {
  const { x, y } = relXY(e)
  send({ type: 'mouseEvent', x, y, button: BUTTONS[e.button] || 'left', buttons: e.buttons, clickCount: 1, deltaX: 0, deltaY: 0, modifiers: MOD(e), pointerType: 'mouse' })
})

overlay.addEventListener('mouseup', (e) => {
  const { x, y } = relXY(e)
  send({ type: 'mouseEvent', x, y, button: BUTTONS[e.button] || 'left', buttons: e.buttons, clickCount: 0, deltaX: 0, deltaY: 0, modifiers: MOD(e), pointerType: 'mouse' })
})

overlay.addEventListener('click', (e) => {
  const { x, y } = relXY(e)
  send({ type: 'mouseEvent', x, y, button: BUTTONS[e.button] || 'left', buttons: 0, clickCount: 1, deltaX: 0, deltaY: 0, modifiers: MOD(e), pointerType: 'mouse' })
})

overlay.addEventListener('wheel', (e) => {
  e.preventDefault()
  const { x, y } = relXY(e)
  send({ type: 'mouseEvent', x, y, button: 'none', buttons: 0, clickCount: 0, deltaX: e.deltaX, deltaY: e.deltaY, modifiers: MOD(e), pointerType: 'mouse' })
}, { passive: false })

overlay.addEventListener('contextmenu', (e) => e.preventDefault())

overlay.addEventListener('keydown', (e) => {
  e.preventDefault()
  send({ type: 'keyEvent', type: 'keyDown', key: e.key, code: e.code, modifiers: MOD(e), windowsVirtualKeyCode: e.keyCode, nativeVirtualKeyCode: e.keyCode })
})

overlay.addEventListener('keyup', (e) => {
  e.preventDefault()
  send({ type: 'keyEvent', type: 'keyUp', key: e.key, code: e.code, modifiers: MOD(e), windowsVirtualKeyCode: e.keyCode, nativeVirtualKeyCode: e.keyCode })
})
</script>
</body>
</html>
