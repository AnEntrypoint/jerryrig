<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: sans-serif; width: 260px; padding: 12px; margin: 0; }
  label { font-size: 12px; color: #333; }
  input { width: 100%; box-sizing: border-box; margin: 4px 0 8px; padding: 4px 6px; }
  button { width: 100%; padding: 6px; margin-top: 4px; cursor: pointer; }
  .status { font-size: 12px; margin-top: 6px; color: #555; }
  .status span { font-weight: bold; }
</style>
</head>
<body>
<label>Audio/Video WebSocket URL</label>
<input id="wsUrl" type="text" placeholder="ws://127.0.0.1:9888">
<button id="btn">Start</button>
<div class="status">Audio: <span id="status">Idle</span></div>
<script src="popup.js"></script>
</body>
</html>
