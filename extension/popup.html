<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: sans-serif; width: 260px; padding: 12px; margin: 0; }
  input { width: 100%; box-sizing: border-box; margin: 6px 0; padding: 4px 6px; }
  button { width: 100%; padding: 6px; margin-top: 4px; cursor: pointer; }
  #status { font-size: 12px; margin-top: 8px; color: #555; }
</style>
</head>
<body>
<label>WebSocket URL</label>
<input id="wsUrl" type="text" placeholder="ws://127.0.0.1:9888">
<button id="btn">Start</button>
<div id="status">Idle</div>
<script src="popup.js"></script>
</body>
</html>
